name: cla
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write # signature records on the cla-signatures branch
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/hskrasek/oast-server/blob/main/CLA.md
          branch: cla-signatures
          allowlist: hskrasek, dependabot[bot]
          custom-notsigned-prcomment: >
            Thanks for the contribution! Before it can be merged, please sign the
            [Contributor License Agreement](https://github.com/hskrasek/oast-server/blob/main/CLA.md)
            by commenting the sentence below. You keep your copyright — the CLA grants
            the license that lets the hosted version fund this open project.
