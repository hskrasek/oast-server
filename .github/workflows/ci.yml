name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: xdebug
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test:js
        env:
          # vitest boots a Vite dev server internally; laravel-vite-plugin refuses that when CI is set
          LARAVEL_BYPASS_ENV_CHECK: 1
      - run: composer install --prefer-dist --no-interaction
      - run: composer test
      - run: docker build --tag oast-server:ci .
